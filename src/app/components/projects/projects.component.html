<div class="page">
  <div class="toast" [class.show]="showToast">
    <span class="toast-icon">✓</span>
    Projects Saved!
    <div class="toast-bar"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">Projects</div>
      <div class="card-sub">Showcase your best work</div>
    </div>

    <div class="form-section">
      <div class="field">
        <label>Project Title</label>
        <input
          [(ngModel)]="project.title"
          name="title"
          placeholder="My Awesome Project"
        />
      </div>

      <div class="field">
        <label>Description</label>
        <textarea
          [(ngModel)]="project.description"
          name="description"
          placeholder="What does this project do?"
          rows="3"
        ></textarea>
      </div>

      <div class="field">
        <label>Project Link</label>
        <input
          [(ngModel)]="project.link"
          name="link"
          placeholder="https://github.com/..."
        />
      </div>

      <button class="btn-add" (click)="addProject()">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        Add Project
      </button>
    </div>

    <div class="divider" *ngIf="projects.length > 0"></div>

    <div class="projects-list">
      <div class="project-card" *ngFor="let p of projects; let i = index">
        <div class="project-info">
          <div class="project-title">{{ p.title }}</div>
          <div class="project-desc">{{ p.description }}</div>
          <a [href]="p.link" target="_blank" class="project-link">
            <svg
              width="12"
              height="12"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"
              />
              <path
                d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"
              />
            </svg>
            View Project
          </a>
        </div>
        <button class="delete-btn" (click)="removeProject(i)">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6l-1 14H6L5 6" />
            <path d="M10 11v6M14 11v6" />
          </svg>
        </button>
      </div>
    </div>

    <div class="empty" *ngIf="projects.length === 0">
      No projects added yet — fill the form above
    </div>

    <button class="btn-main" (click)="saveProjects()">Save Projects</button>
  </div>
</div>
