<div class="page">
  <div class="templates-area">
    <app-template1
      *ngIf="selectedTemplate === 'template1'"
      [user]="user"
    ></app-template1>
    <app-template2
      *ngIf="selectedTemplate === 'template2'"
      [user]="user"
    ></app-template2>
    <app-template3
      *ngIf="selectedTemplate === 'template3'"
      [user]="user"
    ></app-template3>
    <app-template4
      *ngIf="selectedTemplate === 'template4'"
      [user]="user"
    ></app-template4>
  </div>

  <div class="publish-section">
    <button
      class="btn-publish"
      *ngIf="!publishedLink"
      (click)="publishPortfolio()"
    >
      <svg
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="M22 2L11 13" />
        <path d="M22 2L15 22 11 13 2 9l20-7z" />
      </svg>
      Publish Portfolio
    </button>

    <div class="publish-card" *ngIf="publishedLink">
      <div class="publish-success">
        <div class="success-icon">✓</div>
        <div>
          <div class="success-title">Portfolio Published!</div>
          <div class="success-sub">Your portfolio is now live</div>
        </div>
      </div>

      <div class="link-row">
        <input [value]="publishedLink" readonly class="link-input" />
        <button class="btn-copy" (click)="copyLink()">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="9" y="9" width="13" height="13" rx="2" />
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
          </svg>
          {{ copied ? "Copied!" : "Copy" }}
        </button>
      </div>

      <a [href]="publishedLink" target="_blank" class="open-link">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
          <polyline points="15 3 21 3 21 9" />
          <line x1="10" y1="14" x2="21" y2="3" />
        </svg>
        Open Portfolio
      </a>
    </div>
  </div>
</div>
